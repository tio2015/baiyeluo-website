name: 构建并部署贝叶经网站到阿里云OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 构建（静态导出）
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 安装依赖（oss2 最新版）
        run: pip install "oss2>=2.18.0"

      - name: 部署到香港 OSS（pattra.net 国际访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, mimetypes
          from pathlib import Path

          auth = oss2.Auth(os.environ['OSS_KEY_ID'], os.environ['OSS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-hongkong.aliyuncs.com', 'pattra-net')

          out_dir = Path('out')
          total = 0

          for local_path in out_dir.rglob('*'):
              if not local_path.is_file():
                  continue

              oss_key = str(local_path.relative_to(out_dir))
              mime = mimetypes.guess_type(str(local_path))[0] or 'application/octet-stream'

              if local_path.suffix == '.html':
                  cache = 'no-cache, no-store, must-revalidate'
              elif '_next' in oss_key:
                  cache = 'max-age=31536000, immutable'
              else:
                  cache = 'max-age=86400'

              headers = {'Content-Type': mime, 'Cache-Control': cache}
              bucket.put_object_from_file(oss_key, str(local_path), headers=headers)
              total += 1
              if total % 10 == 0:
                  print(f'  上传中... {total} 个文件')

          print(f'✅ 香港部署完成：共上传 {total} 个文件 → pattra.net')
          PYEOF

      - name: 配置上海 OSS（pattra.yiyeguizhen.com 国内访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, hmac, hashlib, base64, datetime, requests

          AK = os.environ['OSS_KEY_ID']
          SK = os.environ['OSS_KEY_SECRET']
          BUCKET_NAME = 'pattra-yiyeguizhen'
          REGION = 'cn-shanghai'

          auth = oss2.Auth(AK, SK)
          bucket = oss2.Bucket(auth, 'https://oss-cn-shanghai.aliyuncs.com', BUCKET_NAME)

          def oss_sign_put(ak, sk, bucket_name, resource_suffix, body, content_type='application/xml'):
              """生成 OSS HMAC-SHA1 签名，用于 PUT 请求"""
              date_str = datetime.datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S GMT')
              content_md5 = base64.b64encode(hashlib.md5(body).digest()).decode()
              if bucket_name:
                  canonical_resource = f'/{bucket_name}/{resource_suffix}'
                  host = f'{bucket_name}.oss-cn-shanghai.aliyuncs.com'
              else:
                  canonical_resource = f'/{resource_suffix}'
                  host = 'oss-cn-shanghai.aliyuncs.com'
              string_to_sign = f'PUT\n{content_md5}\n{content_type}\n{date_str}\n{canonical_resource}'
              sig = base64.b64encode(hmac.new(sk.encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
              return {
                  'Authorization': f'OSS {ak}:{sig}',
                  'Content-Type': content_type,
                  'Content-MD5': content_md5,
                  'Date': date_str,
                  'Host': host,
              }, host

          bpa_body = b'<?xml version="1.0" encoding="UTF-8"?><PublicAccessBlockConfiguration><BlockPublicAccess>false</BlockPublicAccess></PublicAccessBlockConfiguration>'

          # 先试关闭账号级 BPA（service endpoint）
          hdrs, host = oss_sign_put(AK, SK, '', '?publicAccessBlock', bpa_body)
          try:
              r = requests.put(f'https://{host}/?publicAccessBlock', data=bpa_body, headers=hdrs, timeout=10)
              print(f'账号级 BPA disable: {r.status_code} {r.text[:200]}')
          except Exception as e:
              print(f'账号级 BPA: {e}')

          # 再关闭 bucket 级 BPA
          hdrs, host = oss_sign_put(AK, SK, BUCKET_NAME, '?publicAccessBlock', bpa_body)
          try:
              r = requests.put(f'https://{host}/?publicAccessBlock', data=bpa_body, headers=hdrs, timeout=10)
              print(f'Bucket 级 BPA disable: {r.status_code} {r.text[:200]}')
          except Exception as e:
              print(f'Bucket BPA: {e}')

          # 创建 bucket（已存在则忽略）
          try:
              bucket.create_bucket()
              print('Bucket created')
          except Exception as e:
              if 'BucketAlreadyExists' in str(e) or 'already' in str(e).lower():
                  print('Bucket already exists')
              else:
                  raise

          # 设置公开读 ACL
          try:
              bucket.put_bucket_acl(oss2.BUCKET_ACL_PUBLIC_READ)
              print('ACL: public-read OK')
          except Exception as e:
              print(f'ACL: {e}')

          # 静态网站托管
          website = oss2.models.BucketWebsite('index.html', '404.html')
          bucket.put_bucket_website(website)
          print('Static website hosting: enabled')

          # 绑定自定义域名（原始 HTTP API + 自动 DNS 验证）
          import xml.etree.ElementTree as ET
          import uuid as uuid_mod

          CUSTOM_DOMAIN = 'pattra.yiyeguizhen.com'
          BUCKET_HOST = f'{BUCKET_NAME}.oss-cn-shanghai.aliyuncs.com'

          def oss_raw(method, ak, sk, bucket_name, query_suffix, body, content_type='application/xml'):
              date_str = datetime.datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S GMT')
              content_md5 = base64.b64encode(hashlib.md5(body).digest()).decode() if body else ''
              canonical_resource = f'/{bucket_name}/?{query_suffix}'
              string_to_sign = f'{method}\n{content_md5}\n{content_type}\n{date_str}\n{canonical_resource}'
              sig = base64.b64encode(hmac.new(sk.encode(), string_to_sign.encode(), hashlib.sha1).digest()).decode()
              hdrs = {
                  'Authorization': f'OSS {ak}:{sig}',
                  'Content-Type': content_type,
                  'Date': date_str,
                  'Host': BUCKET_HOST,
              }
              if body:
                  hdrs['Content-MD5'] = content_md5
              url = f'https://{BUCKET_HOST}/?{query_suffix}'
              return requests.request(method, url, data=body if body else None, headers=hdrs, timeout=15)

          # Step 1: 申请 CNAME Token
          token_body = f'<?xml version="1.0" encoding="UTF-8"?><BucketCnameConfiguration><Cname><Domain>{CUSTOM_DOMAIN}</Domain></Cname></BucketCnameConfiguration>'.encode()
          r = oss_raw('POST', AK, SK, BUCKET_NAME, 'cname&comp=token', token_body)
          print(f'CreateCnameToken: {r.status_code}')
          cname_token = None
          if r.status_code == 200:
              print(f'Token XML: {r.text[:500]}')
              try:
                  root = ET.fromstring(r.text)
                  # 尝试所有可能的路径
                  for path in ['.//CnameToken', 'CnameToken', './/Token', './/token']:
                      val = root.findtext(path)
                      if val:
                          cname_token = val
                          break
                  # 也试 namespace 方式
                  if not cname_token:
                      for child in root.iter():
                          if 'token' in child.tag.lower() or 'Token' in child.tag:
                              cname_token = child.text
                              break
                  print(f'Token: {cname_token}')
              except Exception as pe:
                  print(f'Parse token: {pe}, body={r.text[:300]}')
          else:
              print(f'Token resp: {r.text[:300]}')

          # Step 2: 自动加 DNS TXT 验证记录
          if cname_token:
              import urllib.parse, urllib.request
              def dns_api_call(action, extra):
                  params = {
                      'Format': 'JSON', 'Version': '2015-01-09', 'AccessKeyId': AK,
                      'SignatureMethod': 'HMAC-SHA1',
                      'Timestamp': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                      'SignatureVersion': '1.0', 'SignatureNonce': str(uuid_mod.uuid4()),
                      'Action': action,
                  }
                  params.update(extra)
                  sorted_p = sorted(params.items())
                  qs = urllib.parse.urlencode(sorted_p)
                  sts = 'GET&' + urllib.parse.quote('/', safe='') + '&' + urllib.parse.quote(qs, safe='')
                  sig2 = base64.b64encode(hmac.new((SK+'&').encode(), sts.encode(), hashlib.sha1).digest()).decode()
                  params['Signature'] = sig2
                  url2 = 'https://alidns.aliyuncs.com/?' + urllib.parse.urlencode(params)
                  import json as json_mod
                  try:
                      with urllib.request.urlopen(url2, timeout=15) as resp2:
                          return json_mod.loads(resp2.read().decode())
                  except urllib.error.HTTPError as ex:
                      return json_mod.loads(ex.read().decode())

              # 检查是否已有此 TXT 记录
              existing = dns_api_call('DescribeDomainRecords', {
                  'DomainName': 'yiyeguizhen.com', 'RRKeyWord': '_dnsauth.pattra', 'Type': 'TXT'
              })
              records = existing.get('DomainRecords', {}).get('Record', [])
              if records:
                  print(f'TXT 记录已存在，更新中...')
                  upd = dns_api_call('UpdateDomainRecord', {
                      'RecordId': records[0]['RecordId'], 'RR': '_dnsauth.pattra',
                      'Type': 'TXT', 'Value': cname_token, 'TTL': '600'
                  })
                  print(f'TXT 更新: {upd}')
              else:
                  add = dns_api_call('AddDomainRecord', {
                      'DomainName': 'yiyeguizhen.com', 'RR': '_dnsauth.pattra',
                      'Type': 'TXT', 'Value': cname_token, 'TTL': '600'
                  })
                  print(f'TXT 添加: {add}')

              import time
              time.sleep(5)

              # Step 3: 绑定 CNAME（先用 oss2 内置，再回退原始 API）
              bound = False
              # 3a: oss2 原生方法
              for cls_name in ['BucketCname', 'CnameConfiguration']:
                  try:
                      cls = getattr(oss2.models, cls_name, None)
                      if cls:
                          bucket.put_bucket_cname(cls(CUSTOM_DOMAIN))
                          print(f'CNAME 绑定成功（oss2.models.{cls_name}）')
                          bound = True
                          break
                  except Exception as e3:
                      print(f'oss2 {cls_name}: {e3}')
              # 3b: 打印当前 oss2 cname 相关方法
              if not bound:
                  cname_methods = [m for m in dir(bucket) if 'cname' in m.lower() or 'Cname' in m]
                  print(f'oss2 cname methods: {cname_methods}')
                  cname_models = [m for m in dir(oss2.models) if 'cname' in m.lower() or 'Cname' in m]
                  print(f'oss2 cname models: {cname_models}')
                  print(f'注意：TXT token={cname_token}, 手动绑定 CNAME 后可访问')
          PYEOF

      - name: 部署到上海 OSS（pattra.yiyeguizhen.com 国内访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, mimetypes
          from pathlib import Path

          auth = oss2.Auth(os.environ['OSS_KEY_ID'], os.environ['OSS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-shanghai.aliyuncs.com', 'pattra-yiyeguizhen')

          out_dir = Path('out')
          total = 0

          for local_path in out_dir.rglob('*'):
              if not local_path.is_file():
                  continue

              oss_key = str(local_path.relative_to(out_dir))
              mime = mimetypes.guess_type(str(local_path))[0] or 'application/octet-stream'

              if local_path.suffix == '.html':
                  cache = 'no-cache, no-store, must-revalidate'
              elif '_next' in oss_key:
                  cache = 'max-age=31536000, immutable'
              else:
                  cache = 'max-age=86400'

              headers = {'Content-Type': mime, 'Cache-Control': cache}
              bucket.put_object_from_file(oss_key, str(local_path), headers=headers)
              total += 1
              if total % 10 == 0:
                  print(f'  上传中... {total} 个文件')

          print(f'✅ 上海部署完成：共上传 {total} 个文件 → pattra.yiyeguizhen.com')
          PYEOF

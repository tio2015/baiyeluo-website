name: 构建并部署贝叶经网站到阿里云OSS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: npm ci

      - name: 构建（静态导出）
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: 安装依赖（oss2 最新版）
        run: pip install "oss2>=2.18.0"

      - name: 部署到香港 OSS（pattra.net 国际访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, mimetypes
          from pathlib import Path

          auth = oss2.Auth(os.environ['OSS_KEY_ID'], os.environ['OSS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-hongkong.aliyuncs.com', 'pattra-net')

          out_dir = Path('out')
          total = 0

          for local_path in out_dir.rglob('*'):
              if not local_path.is_file():
                  continue

              oss_key = str(local_path.relative_to(out_dir))
              mime = mimetypes.guess_type(str(local_path))[0] or 'application/octet-stream'

              if local_path.suffix == '.html':
                  cache = 'no-cache, no-store, must-revalidate'
              elif '_next' in oss_key:
                  cache = 'max-age=31536000, immutable'
              else:
                  cache = 'max-age=86400'

              headers = {'Content-Type': mime, 'Cache-Control': cache}
              bucket.put_object_from_file(oss_key, str(local_path), headers=headers)
              total += 1
              if total % 10 == 0:
                  print(f'  上传中... {total} 个文件')

          print(f'✅ 香港部署完成：共上传 {total} 个文件 → pattra.net')
          PYEOF

      - name: 配置上海 OSS（pattra.yiyeguizhen.com 国内访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, hmac, hashlib, base64, datetime, requests, urllib.parse, urllib.request, uuid, json, time

          AK = os.environ['OSS_KEY_ID']
          SK = os.environ['OSS_KEY_SECRET']
          BUCKET_NAME = 'pattra-yiyeguizhen'
          CUSTOM_DOMAIN = 'pattra.yiyeguizhen.com'

          auth = oss2.Auth(AK, SK)
          bucket = oss2.Bucket(auth, 'https://oss-cn-shanghai.aliyuncs.com', BUCKET_NAME)

          def oss_sign_put(ak, sk, bucket_name, path, body):
              date_str = datetime.datetime.utcnow().strftime('%a, %d %b %Y %H:%M:%S GMT')
              content_md5 = base64.b64encode(hashlib.md5(body).digest()).decode()
              host = f'{bucket_name}.oss-cn-shanghai.aliyuncs.com' if bucket_name else 'oss-cn-shanghai.aliyuncs.com'
              canonical = f'/{bucket_name}/{path}' if bucket_name else f'/{path}'
              sts = f'PUT\n{content_md5}\napplication/xml\n{date_str}\n{canonical}'
              sig = base64.b64encode(hmac.new(sk.encode(), sts.encode(), hashlib.sha1).digest()).decode()
              return {'Authorization': f'OSS {ak}:{sig}', 'Content-Type': 'application/xml',
                      'Content-MD5': content_md5, 'Date': date_str, 'Host': host}, host

          def dns_call(action, extra):
              params = {'Format':'JSON','Version':'2015-01-09','AccessKeyId':AK,
                        'SignatureMethod':'HMAC-SHA1','SignatureVersion':'1.0',
                        'Timestamp':datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                        'SignatureNonce':str(uuid.uuid4()),'Action':action}
              params.update(extra)
              qs = urllib.parse.urlencode(sorted(params.items()))
              sts = 'GET&%2F&' + urllib.parse.quote(qs, safe='')
              sig = base64.b64encode(hmac.new((SK+'&').encode(), sts.encode(), hashlib.sha1).digest()).decode()
              params['Signature'] = sig
              url = 'https://alidns.aliyuncs.com/?' + urllib.parse.urlencode(params)
              try:
                  with urllib.request.urlopen(url, timeout=15) as r: return json.loads(r.read().decode())
              except urllib.error.HTTPError as e: return json.loads(e.read().decode())

          # 1. 关闭 BPA
          bpa_body = b'<?xml version="1.0" encoding="UTF-8"?><PublicAccessBlockConfiguration><BlockPublicAccess>false</BlockPublicAccess></PublicAccessBlockConfiguration>'
          for bn in ['', BUCKET_NAME]:
              h, host = oss_sign_put(AK, SK, bn, '?publicAccessBlock', bpa_body)
              r = requests.put(f'https://{host}/?publicAccessBlock', data=bpa_body, headers=h, timeout=10)
              print(f'BPA {"账号" if not bn else "Bucket"}: {r.status_code}')

          # 2. 创建 bucket
          try:
              bucket.create_bucket()
              print('Bucket created')
          except Exception as e:
              print('Bucket already exists' if 'already' in str(e).lower() else f'create: {e}')

          # 3. ACL
          try:
              bucket.put_bucket_acl(oss2.BUCKET_ACL_PUBLIC_READ)
              print('ACL: public-read OK')
          except Exception as e:
              print(f'ACL: {e}')

          # 4. 静态网站托管
          bucket.put_bucket_website(oss2.models.BucketWebsite('index.html', '404.html'))
          print('Static website: enabled')

          # 5. CNAME 绑定（oss2 2.19.1 原生 API）
          # 5a. 获取验证 token
          try:
              token_result = bucket.create_bucket_cname_token(CUSTOM_DOMAIN)
              cname_token = token_result.cname_token
              print(f'CNAME token: {cname_token}')
          except Exception as e:
              print(f'create_bucket_cname_token: {e}')
              cname_token = None

          # 5b. 更新 DNS TXT 验证记录
          if cname_token:
              existing = dns_call('DescribeDomainRecords', {
                  'DomainName':'yiyeguizhen.com','RRKeyWord':'_dnsauth.pattra','Type':'TXT'})
              records = existing.get('DomainRecords', {}).get('Record', [])
              if records:
                  r2 = dns_call('UpdateDomainRecord', {
                      'RecordId': records[0]['RecordId'], 'RR': '_dnsauth.pattra',
                      'Type': 'TXT', 'Value': cname_token, 'TTL': '600'})
                  print(f'TXT 更新: {r2.get("RecordId") or r2.get("Code")}')
              else:
                  r2 = dns_call('AddDomainRecord', {
                      'DomainName':'yiyeguizhen.com','RR':'_dnsauth.pattra',
                      'Type':'TXT','Value':cname_token,'TTL':'600'})
                  print(f'TXT 添加: {r2.get("RecordId") or r2.get("Code")}')

              time.sleep(10)

              # 5c. 绑定 CNAME
              try:
                  req = oss2.models.PutBucketCnameRequest(CUSTOM_DOMAIN)
                  bucket.put_bucket_cname(req)
                  print(f'CNAME 绑定成功: {CUSTOM_DOMAIN}')
              except Exception as e:
                  print(f'put_bucket_cname: {e}')
          PYEOF

      - name: 部署到上海 OSS（pattra.yiyeguizhen.com 国内访问）
        env:
          OSS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          python3 << 'PYEOF'
          import oss2, os, mimetypes
          from pathlib import Path

          auth = oss2.Auth(os.environ['OSS_KEY_ID'], os.environ['OSS_KEY_SECRET'])
          bucket = oss2.Bucket(auth, 'https://oss-cn-shanghai.aliyuncs.com', 'pattra-yiyeguizhen')

          out_dir = Path('out')
          total = 0

          for local_path in out_dir.rglob('*'):
              if not local_path.is_file():
                  continue

              oss_key = str(local_path.relative_to(out_dir))
              mime = mimetypes.guess_type(str(local_path))[0] or 'application/octet-stream'

              if local_path.suffix == '.html':
                  cache = 'no-cache, no-store, must-revalidate'
              elif '_next' in oss_key:
                  cache = 'max-age=31536000, immutable'
              else:
                  cache = 'max-age=86400'

              headers = {'Content-Type': mime, 'Cache-Control': cache}
              bucket.put_object_from_file(oss_key, str(local_path), headers=headers)
              total += 1
              if total % 10 == 0:
                  print(f'  上传中... {total} 个文件')

          print(f'✅ 上海部署完成：共上传 {total} 个文件 → pattra.yiyeguizhen.com')
          PYEOF
